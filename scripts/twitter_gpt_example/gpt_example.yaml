---
data:
  # 修改数据库路径，避免冲突
  db_path: data/simu_db/yaml_gpt/test_thirdparty_run_1.db
  csv_path: data/our_twitter_sim/test_10_good_bad_random_multimodal_wlx.csv
# data:
#   db_path: data/simu_db/yaml_gpt/test_100_run.db # 建议顺手改一下数据库名以免覆盖旧数据
#   csv_path: data/our_twitter_sim/test_100_good_bad_random_bernoulli_wlx.csv  # <--- 修改点 3：路径必须指向包含 100 个节点的 CSV 文件
simulation:
  num_timesteps: 10      # 保持较小的时间步
  clock_factor: 60
  recsys_type: twhin-bert
  # recsys_type: random
  
model:
  num_agents: 10        # 代理数量设为 2
  model_random_seed: 42
  cfgs:
    - model_type: gpt-4o-mini  # <--- 修改：填写第三方服务提供的模型名称 (例如 deepseek-chat, moonshot-v1-8k 等)
      num: 10          # 必须与 num_agents 一致
      server_url: null  # 保持为 null，我们将通过环境变量控制
      model_path: null
      stop_tokens: null
      temperature: 0.5
inference:
  model_type: gpt-4o-mini  # <--- 修改：与上面一致
  is_openai_model: true      # <--- 关键：必须为 true，让代码走 API 调用逻辑


actions:
  create_post:
    description: "Create a new post on your timeline."
    arguments:
      - name: "content"
        type: "string"
        description: "The text content of the post."
  
  quote_post:
    description: "Quote a specified post and add your own thoughts to it."
    arguments:
      - name: "post_id"
        type: "integer"
        description: "The ID of the post to be quoted."
      - name: "quote_content"
        type: "string"
        description: "Your own thoughts added to the quote."
  
  like_post:
    description: "Like a specific post."
    arguments:
      - name: "post_id"
        type: "integer"
        description: "The ID of the post to like."

  dislike_post:
    description: "Dislikes a specified post."
    arguments:
      - name: "post_id"
        type: "integer"
        description: "The ID of the post to be disliked."
  
  repost:
    description: "Repost someone else's post."
    arguments:
      - name: "post_id"
        type: "integer"
        description: "The ID of the post to repost."
  
  create_comment:
    description: "Comment on a specific post."
    arguments:
      - name: "post_id"
        type: "integer"
        description: "The ID of the post."
      - name: "content"
        type: "string"
        description: "The text of your comment."
      # 必须加上下面这个参数，告诉大模型需要输出 agree 的布尔值
      - name: "agree"
        type: "boolean"
        description: "Whether you agree with this post or not based on content. True for agree, False for disagree."
      - name: "emotion"
        type: "string"
        description:
            " The underlying emotion driving your comment. You MUST choose exactly one from the following list:
            ['panic', 'fanaticism', 'confusion', 'skepticism', 'anger', 'sarcasm', 'neutral']
            * Guidelines for emotion selection:
            - 'panic' / 'fanaticism': Use when deceived, anxious, or blindly following.
            - 'confusion': Use when unsure about the truthfulness.
            - 'skepticism': Use when you doubt the post's credibility (typical after factual prebunking).
            - 'anger': Use when you recognize fake news and feel indignant.
            - 'sarcasm': Use to mock or debunk the fake news humorously.
            - 'neutral': Regular objective statements."
  
  like_comment:
    description: "Like a specified comment."
    arguments:
      - name: "comment_id"
        type: "integer"
        description: "The ID of the comment to be liked."
  
  dislike_comment:
    description: "Dislike a specified comment."
    arguments:
      - name: "comment_id"
        type: "integer"
        description: "The ID of the comment to be disliked."
  
  follow:
    description: "Follow a user."
    arguments:
      - name: "followee_id"
        type: "integer"
        description: "The ID of the user to be followed."

  mute:
    description: "Mute a user."
    arguments:
      - name: "mutee_id"
        type: "integer"
        description: "The ID of the user to mute."
