---
data:
  # 修改数据库路径，避免冲突
  db_path: data/simu_db/yaml_gpt/30mis_pre.db
  csv_path: data/our_twitter_sim/test_30_good_bad_random_bernoulli_.csv
# data:
#   db_path: data/simu_db/yaml_gpt/test_100_run.db # 建议顺手改一下数据库名以免覆盖旧数据
#   csv_path: data/our_twitter_sim/test_100_good_bad_random_bernoulli_wlx.csv  # <--- 修改点 3：路径必须指向包含 100 个节点的 CSV 文件
simulation:
  num_timesteps: 5      # 保持较小的时间步
  clock_factor: 60
  recsys_type: twhin-bert
  # recsys_type: random
  
model:
  num_agents: 30       # 代理数量设为 2
  model_random_seed: 42
  cfgs:
    - model_type: gpt-4o-mini  # <--- 修改：填写第三方服务提供的模型名称 (例如 deepseek-chat, moonshot-v1-8k 等)
      num: 30         # 必须与 num_agents 一致
      server_url: null  # 保持为 null，我们将通过环境变量控制
      model_path: null
      stop_tokens: null
      temperature: 0.6
inference:
  model_type: gpt-4o-mini  # <--- 修改：与上面一致
  is_openai_model: true      # <--- 关键：必须为 true，让代码走 API 调用逻辑

# defense:
#   strategy: debunking
#   timestep: 5
#   threshold: 0.5

actions:
  create_post:
    description: "Create a new post on your timeline."
    arguments:
      - name: "content"
        type: "string"
        description: "The text content of the post."
  
  quote_post:
    description: "Quote a specified post and add your own thoughts to it."
    arguments:
      - name: "post_id"
        type: "integer"
        description: "The ID of the post to be quoted."
      - name: "quote_content"
        type: "string"
        description: "Your own thoughts added to the quote."
  
  like_post:
    description: "Like a specific post."
    arguments:
      - name: "post_id"
        type: "integer"
        description: "The ID of the post to like."

  dislike_post:
    description: "Dislikes a specified post."
    arguments:
      - name: "post_id"
        type: "integer"
        description: "The ID of the post to be disliked."
  
  repost:
    description: "Repost someone else's post."
    arguments:
      - name: "post_id"
        type: "integer"
        description: "The ID of the post to repost."
  
  like_comment:
    description: "Like a specified comment. Trigger this action when you strongly agree with the comment's viewpoint, find it highly insightful, or if the comment successfully debunks fake news and provides helpful factual context. Use the comment's ID as the comment_id."
    arguments:
      - name: "comment_id"
        type: "integer"
        description: "The ID of the comment to be liked."
  
  dislike_comment:
    description: "Dislike a specified comment. Trigger this action when the comment spreads obvious misinformation, is offensive, highly illogical, outrage-baiting, or strongly contradicts verified facts or your core beliefs. Use the comment's ID as the comment_id."
    arguments:
      - name: "comment_id"
        type: "integer"
        description: "The ID of the comment to be disliked."
  
  follow:
    description: "Follow a user. Trigger this action when you find the user's posts highly valuable, informative, or if you strongly agree with their perspectives. Use the author's user ID as the followee_id."
    arguments:
      - name: "followee_id"
        type: "integer"
        description: "The ID of the user to be followed."

  mute:
    description: "Mute a user. Trigger this action if the user frequently posts fake news, outrageous claims, or content you find offensive or highly confusing. Use the author's user ID as the mutee_id to stop seeing their posts."
    arguments:
      - name: "mutee_id"
        type: "integer"
        description: "The ID of the user to mute."

  create_comment:
    description: "Comment on a specific post."
    arguments:
      - name: "post_id"
        type: "integer"
        description: "The ID of the post."
      - name: "content"
        type: "string"
        description: "The text of your comment."
      - name: "agree"
        type: "boolean"
        description: "Whether you agree with this post or not based on content. True for agree, False for disagree."
      - name: "reasoning"
        type: "string"
        description: "Your Chain-of-Thought reasoning. Briefly analyze the original post's literal meaning, its potential implicit semantics/bias, and determine your underlying motive for this comment."
      - name: "emotion"
        type: "string"
        description:
            " The underlying emotion driving your comment. You MUST choose exactly one from the following list:
            ['skepticism', 'sarcasm', 'vigilance', 'neutral', 'anger', 'panic', 'fanaticism', 'confusion']
            * Guidelines for emotion selection:
            - 'skepticism': Use when you critically doubt the post's credibility, source, or logic (a primary indicator of successful inoculation).
            - 'sarcasm': Use when you easily recognize the falsehood and choose to mock or ridicule the post or its author.
            - 'vigilance': Use when you actively warn others not to believe the post or provide corrections to stop its spread.
            - 'neutral': Use for rational, objective fact-checking, or calm, unemotional statements.
            - 'anger': Use when you are successfully provoked by the post's outrage-bait or feel indignant towards the targeted group/issue.
            - 'panic': Use when the post successfully makes you feel fearful, anxious, or threatened about your safety or well-being.
            - 'fanaticism': Use when you blindly agree with the post, showing extreme enthusiasm or echo-chamber conformity without critical thought.
            - 'confusion': Use when you are unsure what to believe, experiencing cognitive dissonance between the post and your prior knowledge."
  

